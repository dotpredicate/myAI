<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>myAI</title>
  <style>
    body {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: "sidebar header" "sidebar main";
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    #sidebar {
      grid-area: sidebar;
      background: #f5f5f5;
      overflow-y: auto;
      padding: 10px;
    }

    #main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    #chatHistory {
      flex: 1;
      padding: 10px;
      overflow: auto;
      background: #fff;
      min-height: 0;
    }

    #inputArea {
      padding: 10px;
      background: #fff;
    }

    textarea {
      font-size: 1.25em;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      grid-area: header;
      text-align: center;
    }

    .menu-item {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .menu-item:hover {
      background: #f8f8f8;
      border-color: #bbb;
    }

    .menu-item.selected {
      background: #fff;
      border-color: #444;
    }

    .msg-label {
      font-weight: bold;
      margin-top: 1em;
    }

    .msg-body {
      margin-top: .5em;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .msg-body table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0.5em;
    }
    .msg-body th,
    .msg-body td {
      border: 1px solid #ddd;
      padding: 4px;
    }
    .msg-body th {
      background: #f9f9f9;
    }

    .blocked {
      background-color: #ffe6e6;
      border-left: 4px solid #ff0000;
    }
    textarea:disabled, button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1 style="text-align:center;">myAI</h1>
  <div id="sidebar">
    <h2>Conversations</h2>
    <button id="newBtnSide" class="menu-item">+ New</button>
    <div id="conversationList"></div>
  </div>
  <div id="main">
    <div id="chatHistory">
      <div id="response"></div>
    </div>
    <div id="inputArea">
      <textarea id="prompt" rows="5" placeholder="Enter prompt here"></textarea>
      <label for="modelSelect">Select Model:</label>
      <select id="modelSelect"></select>
      <button id="sendBtn">Send</button>
      <hr>
      <h3>Upload Documents</h3>
      <input type="file" id="fileInput" multiple accept=".txt,.md">
      <button id="uploadBtn">Upload</button>
      <hr>
      <h3>Search</h3>
      <input type="text" id="searchInput" placeholder="Search query">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <script type="module">
    import * as smdModule from "./smd.js";
    // Expose smd to the global scope so other scripts can access it
    window.smd = smdModule;
  </script>

  <script>
    let blockingMessageId = null;

    function highlightBlockingMessage(id) {
      const elem = document.querySelector(`details[data-message-id='${id}']`);
      if (elem) {
        elem.classList.add('blocked');
        elem.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function clearBlock() {
      blockingMessageId = null;
      const promptArea = document.getElementById('prompt');
      const sendBtn = document.getElementById('sendBtn');
      if (promptArea) promptArea.disabled = false;
      if (sendBtn) sendBtn.disabled = false;
      const blockedElems = document.querySelectorAll('details[data-message-id]');
      blockedElems.forEach(e => e.classList.remove('blocked'));
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const select = document.getElementById('modelSelect');
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        select.appendChild(opt);
      });
      const savedModel = localStorage.getItem('selectedModel');
      if (savedModel) select.value = savedModel;
      select.addEventListener('change', () => {
        localStorage.setItem('selectedModel', select.value);
      });
    }

    let selectedConversationId = null;

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      const list = document.getElementById('conversationList');
      list.innerHTML = '';
      data.forEach(conv => {
        const div = document.createElement('div');
        div.textContent = conv.title;
        div.className = 'menu-item';
        div.dataset.id = conv.id;
        if (selectedConversationId === conv.id) {
          div.classList.add('selected');
        }
        div.addEventListener('click', () => {
          document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          selectedConversationId = conv.id;
          loadConversation(conv.id);
        });
        list.appendChild(div);
      });
    }

    function renderMessage(container, { id, role, element }) {
      const labelEl = document.createElement('div');
      labelEl.textContent = role + ':';
      labelEl.classList.add('msg-label');
      container.appendChild(labelEl);
      if (element.type === 'thinking') {
        const details = document.createElement('details');
        details.className = 'msg-body';
        const summary = document.createElement('summary');
        summary.textContent = 'Thinking';
        details.appendChild(summary);
        const content = document.createElement('div');
        content.textContent = element.content;
        content.className = 'msg-body';
        details.appendChild(content);
        container.appendChild(details);
      } else if (element.type === 'tool_call') {
        const containerElem = document.createElement('details');
        if (id) containerElem.dataset.messageId = id;
        containerElem.dataset.mode = 'function_call';
        const summary = document.createElement('summary');
        summary.textContent = `Function Call: ${element.name}`;
        containerElem.appendChild(summary);
        const contentDiv = document.createElement('div');
        contentDiv.className = 'msg-body';
        const paramsPre = document.createElement('pre');
        const paramsText = typeof element.parameters === 'object' ? JSON.stringify(element.parameters, null, 2) : element.parameters;
        paramsPre.textContent = `Input:\n${paramsText}`;
        contentDiv.appendChild(paramsPre);
        const resultDiv = document.createElement('div');
        resultDiv.style.marginTop = '1em';
        resultDiv.innerHTML = '<strong>Output:</strong>';
        if (element.status === 'pending') {
          const pendingMsg = document.createElement('div');
          pendingMsg.textContent = ' (Pending...)';
          pendingMsg.style.fontStyle = 'italic';
          resultDiv.appendChild(pendingMsg);
        } else if (element.result) {
          const resultPre = document.createElement('pre');
          resultPre.textContent = element.result;
          resultDiv.appendChild(resultPre);
        } else {
          const noResultMsg = document.createElement('div');
          noResultMsg.textContent = ' (No result yet)';
          resultDiv.appendChild(noResultMsg);
        }
        contentDiv.appendChild(resultDiv);
        containerElem.appendChild(contentDiv);
        if (element.is_blocking) {
          const btnApprove = document.createElement('button');
          btnApprove.textContent = 'Approve';
          btnApprove.addEventListener('click', () => {
            handleDecision(containerElem.dataset.messageId, 'approve');
          });
          const btnReject = document.createElement('button');
          btnReject.textContent = 'Reject';
          btnReject.addEventListener('click', () => {
            handleDecision(containerElem.dataset.messageId, 'reject');
          });
          containerElem.appendChild(btnApprove);
          containerElem.appendChild(btnReject);
        }
        container.appendChild(containerElem);
      } else if (element.type === 'tool_decision') {
        const decisionDiv = document.createElement('div');
        decisionDiv.className = 'msg-body';
        decisionDiv.textContent = `Decision: ${element.decision}`;
        container.appendChild(decisionDiv);
      } else if (element.type === 'tool_result') {
        const resultDiv = document.createElement('div');
        resultDiv.className = 'msg-body';
        resultDiv.textContent = `Tool Result: ${element.result}`;
        container.appendChild(resultDiv);
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-body';
        if (role === 'assistant') {
          const renderer = smd.default_renderer(msgDiv);
          const parser = smd.parser(renderer);
          msgDiv._smdParser = parser;
          smd.parser_write(parser, element.content);
          smd.parser_end(parser);
        } else {
          msgDiv.textContent = element.content;
        }
        container.appendChild(msgDiv);
      }
    }

    async function loadConversation(conv_id) {
      const res = await fetch(`/api/conversations/${conv_id}`);
      const data = await res.json();
      const responseContainer = document.getElementById('response');
      responseContainer.innerHTML = '';
      const title = document.createElement('h2');
      title.textContent = data.title + ' (' + new Date(data.created_at).toLocaleString() + ')';
      responseContainer.appendChild(title);
      for (const msg of data.messages) {
        renderMessage(responseContainer, msg);
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    async function* streamPrompt(res, responseContainer) {
      if (res.status === 403) {
        const data = await res.json();
        highlightBlockingMessage(data.blocking_message_id);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      if (!selectedConversationId) {
        const newConvId = res.headers.get('X-Conversation-ID');
        if (newConvId) {
          selectedConversationId = newConvId;
        }
        responseContainer.innerHTML = '';
        const title = document.createElement('h2');
        title.textContent = 'New Conversation (' + new Date().toLocaleString() + ')';
        responseContainer.appendChild(title);
      }

      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed) {
            const jsonObj = JSON.parse(trimmed);
            yield jsonObj;
          }
        }
      }
      if (buffer.trim()) {
        const jsonObj = JSON.parse(buffer.trim());
        yield jsonObj;
      }
    }

    async function processStream(res, responseContainer) {
      const streamState = { type: null };

      const initializeState = (newType) => {
        console.log('Initializing state for type', newType);
        const assistantLabel = document.createElement('div');
        assistantLabel.textContent = 'Assistant:';
        assistantLabel.classList.add('msg-label');
        responseContainer.appendChild(assistantLabel);
        if (newType === 'reasoning') {
          const container = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Reasoning';
          container.appendChild(summary);
          container.dataset.mode = 'reasoning';
          responseContainer.appendChild(container);
          streamState.type = 'reasoning';
          streamState.writeElem = container;
        } else if (newType === 'response') {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'msg-body';
          const renderer = smd.default_renderer(msgDiv);
          const parser = smd.parser(renderer);
          responseContainer.appendChild(msgDiv);
          streamState.type = 'response';
          streamState.parser = parser;
        } else if (newType === 'tool_call') {
          streamState.type = 'tool_call';
        } else {
          console.log('Unhandled type', newType);
        }
        console.log('Initialized state', streamState);
      };

      const finalizeState = () => {
        if (streamState.type === 'response') {
          smd.parser_end(streamState.parser);
        }
      };

      const handleStreamChunk = (chunk) => {
        console.log('Handling stream chunk', chunk);
        if (streamState.type === 'reasoning') {
          streamState.writeElem.append(chunk.content);
        } else if (streamState.type === 'response') {
          smd.parser_write(streamState.parser, chunk.content);
        } else if (streamState.type === 'tool_call') {
          const container = document.createElement('details');
          if (chunk.id) container.dataset.messageId = chunk.id;
          container.dataset.mode = 'function_call';
          const summary = document.createElement('summary');
          summary.textContent = `Function Call: ${chunk.name}`;
          container.appendChild(summary);
          const contentDiv = document.createElement('div');
          contentDiv.className = 'msg-body';
          const paramsPre = document.createElement('pre');
          const paramsText = typeof chunk.parameters === 'object' ? JSON.stringify(chunk.parameters, null, 2) : chunk.parameters;
          paramsPre.textContent = `Input:\n${paramsText}`;
          contentDiv.appendChild(paramsPre);
          const resultDiv = document.createElement('div');
          resultDiv.style.marginTop = '1em';
          resultDiv.innerHTML = '<strong>Output:</strong>';
          if (chunk.status === 'pending') {
            const pendingMsg = document.createElement('div');
            pendingMsg.textContent = ' (Pending...)';
            pendingMsg.style.fontStyle = 'italic';
            resultDiv.appendChild(pendingMsg);
          } else if (chunk.result) {
            const resultPre = document.createElement('pre');
            resultPre.textContent = chunk.result;
            resultDiv.appendChild(resultPre);
          } else {
            const noResultMsg = document.createElement('div');
            noResultMsg.textContent = ' (No result yet)';
            resultDiv.appendChild(noResultMsg);
          }
          contentDiv.appendChild(resultDiv);
          container.appendChild(contentDiv);
          if (chunk.is_blocking) {
            const btnApprove = document.createElement('button');
            btnApprove.textContent = 'Approve';
            btnApprove.addEventListener('click', () => {
              handleDecision(container.dataset.messageId, 'approve');
            });
            const btnReject = document.createElement('button');
            btnReject.textContent = 'Reject';
            btnReject.addEventListener('click', () => {
              handleDecision(container.dataset.messageId, 'reject');
            });
            container.appendChild(btnApprove);
            container.appendChild(btnReject);
          }
          responseContainer.appendChild(container);
        }
      };

      for await (const val of streamPrompt(res, responseContainer)) {
        if (val.type !== streamState.type) {
          finalizeState();
          initializeState(val.type);
        }
        handleStreamChunk(val);
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    async function resumeConversation(conversationId) {
      const modelId = document.getElementById('modelSelect').value;
      const res = await fetch(`/api/conversations/${conversationId}/continue?model_id=${encodeURIComponent(modelId)}`);
      const responseContainer = document.getElementById('response');
      await processStream(res, responseContainer);
    }

    async function sendPrompt() {
      const responseContainer = document.getElementById('response');
      const promptText = document.getElementById('prompt').value;
      const res = await fetch('/api/conversations/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: promptText,
          conversation_id: selectedConversationId
        })
      });
      if (res.status === 403) {
        const data = await res.json();
        highlightBlockingMessage(data.blocking_message_id);
        const promptArea = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        if (promptArea) promptArea.disabled = true;
        if (sendBtn) sendBtn.disabled = true;
        return;
      }
      renderMessage(responseContainer, { id: null, role: 'user', element: { type: 'message', content: promptText } });
      await processStream(res, responseContainer);
    }

    async function handleDecision(msgId, decision) {
      const res = await fetch(`/api/conversations/${selectedConversationId}/tool_calls/${msgId}/decide`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision })
      });
      if (res.ok) {
        const container = document.querySelector(`details[data-message-id='${msgId}']`);
        if (container) {
          const btns = container.querySelectorAll('button');
          btns.forEach(b => b.remove());
        }
        clearBlock();
        await resumeConversation(selectedConversationId);
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    document.getElementById('newBtnSide').addEventListener('click', () => {
      document.getElementById('prompt').value = '';
      document.getElementById('response').innerHTML = '';
      selectedConversationId = null;
      loadConversations();
    });

    loadModels();
    loadConversations();
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const files = document.getElementById('fileInput').files;
      if (!files.length) return;
      const formData = new FormData();
      for (const f of files) formData.append('files', f);
      const res = await fetch('/api/ingest', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      alert(`Uploaded ${data.ids.length} documents.`);
    });

    document.getElementById('searchBtn').addEventListener('click', async () => {
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 10 })
      });
      const data = await res.json();
      const container = document.getElementById('response');
      container.innerHTML = '<h3>Search Results</h3>';
      data.results.forEach(r => {
        const div = document.createElement('div');
        div.innerHTML = `<strong>${r.title}</strong> (score ${r.score.toFixed(4)}): ${r.snippet}`;
        container.appendChild(div);
      });
    });
  </script>
</body>

</html>
