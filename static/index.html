<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>myAI Mock UI</title>
  <style>
    body {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: "sidebar header" "sidebar main";
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    #sidebar {
      grid-area: sidebar;
      background: #f5f5f5;
      overflow-y: auto;
      padding: 10px;
    }

    #main {
      grid-area: main;
      display: flex;
      flex-direction: column;
    }

    #chatHistory {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #fff;
    }

    #inputArea {
      padding: 10px;
      background: #fff;
    }

    textarea {
      font-size: 1.25em;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      grid-area: header;
      text-align: center;
    }

    .menu-item {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .menu-item:hover {
      background: #f8f8f8;
      border-color: #bbb;
    }

    .menu-item.selected {
      background: #fff;
      border-color: #444;
    }
  </style>
</head>

<body>
  <h1 style="text-align:center;">myAI – Mock Interface</h1>
  <div id="sidebar">
    <h2>Conversations</h2>
    <button id="newBtnSide" class="menu-item">+ New</button>
    <div id="conversationList"></div>
  </div>
  <div id="main">
    <div id="chatHistory">
      <pre id="response"></pre>
    </div>
    <div id="inputArea">
      <textarea id="prompt" rows="5" placeholder="Enter prompt here"></textarea>
      <label for="modelSelect">Select Model:</label>
      <select id="modelSelect"></select>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const select = document.getElementById('modelSelect');
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        select.appendChild(opt);
      });
      const savedModel = localStorage.getItem('selectedModel');
      if (savedModel) select.value = savedModel;
      select.addEventListener('change', () => {
        localStorage.setItem('selectedModel', select.value);
      });
    }

    let selectedConversationId = null;

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      const list = document.getElementById('conversationList');
      list.innerHTML = '';
      data.forEach(conv => {
        const div = document.createElement('div');
        div.textContent = conv.title;
        div.className = 'menu-item';
        div.dataset.id = conv.id;
        if (selectedConversationId === conv.id) {
          div.classList.add('selected');
        }
        div.addEventListener('click', () => {
          document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          selectedConversationId = conv.id;
          document.getElementById('sendBtn').disabled = true;
          loadConversation(conv.id);
        });
        list.appendChild(div);
      });
    }

    async function loadConversation(conv_id) {
      const res = await fetch(`/api/conversation/${conv_id}`);
      const data = await res.json();
      const responseContainer = document.getElementById('response');
      responseContainer.innerHTML = '';
      const title = document.createElement('h2');
      title.textContent = data.title + ' (' + new Date(data.created_at).toLocaleString() + ')';
      responseContainer.appendChild(title);
      for (const msg of data.messages) {
        const isAssistant = msg.role === 'assistant';
        for (const elem of msg.elements) {
          const container = elem.type === 'thinking' ? document.createElement('details') : document.createElement('p');
          if (elem.type === 'thinking') {
            const summary = document.createElement('summary');
            summary.textContent = 'Thinking';
            container.appendChild(summary);
          }
          container.textContent = elem.content;
          responseContainer.appendChild(container);
        }
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    async function sendPrompt() {
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      const res = await fetch('/api/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: document.getElementById('prompt').value
        })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      const responseContainer = document.getElementById('response');
      let buffer = '';
      let currentWriteElem = null;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        while (true) {
          const startIdx = buffer.indexOf('{');
          if (startIdx === -1) break;
          let depth = 0;
          let endIdx = -1;
          for (let i = startIdx; i < buffer.length; i++) {
            if (buffer[i] === '{') depth++;
            else if (buffer[i] === '}') depth--;
            if (depth === 0) { endIdx = i; break; }
          }
          if (endIdx === -1) break;
          const jsonStr = buffer.slice(startIdx, endIdx + 1);
          buffer = buffer.slice(endIdx + 1);
          try {
            const val = JSON.parse(jsonStr);
            const msg = val['message'];
            const mode = 'thinking' in msg ? 'thinking' : 'response';
            if (!currentWriteElem || mode !== currentWriteElem.dataset.mode) {
              const container = mode === 'thinking' ? document.createElement('details') : document.createElement('p');
              if (mode === 'thinking') {
                const summary = document.createElement('summary');
                summary.textContent = 'Thinking';
                container.appendChild(summary);
              }
              container.dataset.mode = mode;
              responseContainer.appendChild(container);
              currentWriteElem = container;
            }
            const token = mode === 'thinking' ? msg['thinking'] : msg['content'];
            if (token) currentWriteElem.append(token);
          } catch (e) {
            console.error('JSON parse error', e);
          }
        }
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    document.getElementById('newBtnSide').addEventListener('click', () => {
      document.getElementById('prompt').value = '';
      document.getElementById('response').innerHTML = '';
      selectedConversationId = null;
      document.getElementById('sendBtn').disabled = false;
      loadConversations();
    });

    loadModels();
    loadConversations();
  </script>
</body>

</html>
