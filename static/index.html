<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>myAI</title>
  <style>
    body {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: "sidebar header" "sidebar main";
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    #sidebar {
      grid-area: sidebar;
      background: #f5f5f5;
      overflow-y: auto;
      padding: 10px;
    }

    #main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    #chatHistory {
      flex: 1;
      padding: 10px;
      overflow: auto;
      background: #fff;
      min-height: 0;
    }

    #inputArea {
      padding: 10px;
      background: #fff;
    }

    textarea {
      font-size: 1.25em;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      grid-area: header;
      text-align: center;
    }

    .menu-item {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .menu-item:hover {
      background: #f8f8f8;
      border-color: #bbb;
    }

    .menu-item.selected {
      background: #fff;
      border-color: #444;
    }

    .msg-label {
      font-weight: bold;
      margin-top: 1em;
    }

    .msg-body {
      margin-top: .5em;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .msg-body table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0.5em;
    }

    .msg-body th,
    .msg-body td {
      border: 1px solid #ddd;
      padding: 4px;
    }

    .msg-body th {
      background: #f9f9f9;
    }

    .blocked {
      background-color: #ffe6e6;
      border-left: 4px solid #ff0000;
    }

    textarea:disabled,
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .file-compare {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .file-pane {
      flex: 1;
      background: #f8f8f8;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
    }

    .diff-view {
      background: #f8f8f8;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      margin-top: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1 style="text-align:center;">myAI</h1>
  <div id="sidebar">
    <h2>Conversations</h2>
    <button id="newBtnSide" class="menu-item">+ New</button>
    <div id="conversationList"></div>
  </div>
  <div id="main">
    <div id="chatHistory">
      <div id="response"></div>
    </div>
    <div id="inputArea">
      <textarea id="prompt" rows="5" placeholder="Enter prompt here"></textarea>
      <label for="modelSelect">Select Model:</label>
      <select id="modelSelect"></select>
      <button id="sendBtn">Send</button>
      <hr>
      <h3>Upload Documents</h3>
      <input type="file" id="fileInput" multiple accept=".txt,.md">
      <button id="uploadBtn">Upload</button>
      <hr>
      <h3>Estimate VRAM</h3>
      <input type="text" id="modelEstimateInput" placeholder="Model repo ID (e.g. bartowski/...)" style="width: 100%;">
      <button id="estimateBtn">Estimate</button>
      <div id="estimateResult" style="margin-top: 10px; font-size: 0.9em; white-space: pre-wrap;"></div>
      <label>Device Metrics (e.g. 35TFLOPS;900GBps):</label>
      <input type="text" id="deviceMetricInput" placeholder="TFLOPS;Bandwidth" style="width: 100%;">
      <hr>
      <h3>Search</h3>
      <input type="text" id="searchInput" placeholder="Search query">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <script type="module">
    import * as smdModule from "./smd.js";
    // Expose smd to the global scope so other scripts can access it
    window.smd = smdModule;
  </script>

  <script>
    let blockingMessageId = null;

    function highlightBlockingMessage(id) {
      blockingMessageId = id;
      const elem = document.querySelector(`details[data-message-id='${id}']`);
      if (elem) {
        elem.classList.add('blocked');
        elem.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function clearBlock() {
      blockingMessageId = null;
      const promptArea = document.getElementById('prompt');
      const sendBtn = document.getElementById('sendBtn');
      if (promptArea) promptArea.disabled = false;
      if (sendBtn) sendBtn.disabled = false;
      const blockedElems = document.querySelectorAll('details[data-message-id]');
      blockedElems.forEach(e => e.classList.remove('blocked'));
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const select = document.getElementById('modelSelect');
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        select.appendChild(opt);
      });
      const savedModel = localStorage.getItem('selectedModel');
      if (savedModel) select.value = savedModel;
      select.addEventListener('change', () => {
        localStorage.setItem('selectedModel', select.value);
      });
    }

    let selectedConversationId = null;

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      const list = document.getElementById('conversationList');
      list.innerHTML = '';
      data.forEach(conv => {
        const div = document.createElement('div');
        div.textContent = conv.title || ("Conversation #" + conv.id);
        div.className = 'menu-item';
        div.dataset.id = conv.id;
        if (selectedConversationId === conv.id) {
          div.classList.add('selected');
        }
        div.addEventListener('click', () => {
          document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          selectedConversationId = conv.id;
          loadConversation(conv.id);
        });
        list.appendChild(div);
      });
    }

    class ChatStreamRenderer {
      constructor(responseContainer) {
        this.responseContainer = responseContainer;
        this.streamState = { type: null };
      }

      initializeState(newType, role = 'assistant') {
        console.log('Initializing state for type', newType, 'and role', role);
        const label = document.createElement('div');
        label.textContent = (role === 'user' ? 'User:' : 'Assistant:');
        label.classList.add('msg-label');
        this.responseContainer.appendChild(label);
        if (newType === 'thinking') {
          const container = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Reasoning';
          container.appendChild(summary);
          container.dataset.mode = 'thinking';
          this.responseContainer.appendChild(container);
          this.streamState = {
            type: 'thinking',
            writeElem: container
          };
        } else if (newType === 'message') {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'msg-body';
          const smdRenderer = smd.default_renderer(msgDiv);
          this.responseContainer.appendChild(msgDiv);
          this.streamState = {
            type: 'message',
            parser: smd.parser(smdRenderer)
          };
        } else if (newType === 'tool_call') {
          this.streamState = {
            type: 'tool_call'
          };
        } else {
          console.log('Unhandled type', newType);
        }
        console.log('Initialized state', this.streamState);
      };

      handleStreamChunk(chunk) {
        console.log('Handling stream chunk', chunk);
        if (this.streamState.type === 'thinking') {
          this.streamState.writeElem.append(chunk.content);
        } else if (this.streamState.type === 'message') {
          smd.parser_write(this.streamState.parser, chunk.content);
        } else if (this.streamState.type === 'tool_call') {
          const container = document.createElement('details');
          container.dataset.messageId = chunk.id;
          container.dataset.mode = 'function_call';
          const summary = document.createElement('summary');
          summary.textContent = `Function Call: ${chunk.name}`;
          container.appendChild(summary);
          const contentDiv = document.createElement('div');
          contentDiv.className = 'msg-body';
          const paramsPre = document.createElement('pre');
          const paramsText = typeof chunk.parameters === 'object' ? JSON.stringify(chunk.parameters, null, 2) : chunk.parameters;
          paramsPre.textContent = `Input:\n${paramsText}`;
          contentDiv.appendChild(paramsPre);
          const resultDiv = document.createElement('div');
          resultDiv.style.marginTop = '1em';
          resultDiv.innerHTML = '<strong>Output:</strong>';
          if (chunk.result) {
            const resData = JSON.parse(chunk.result);
            if (resData.type === 'replace_proposal') {
              const compareDiv = document.createElement('div');
              compareDiv.className = 'file-compare';
              const beforeDiv = document.createElement('div');
              beforeDiv.className = 'file-pane';
              beforeDiv.innerHTML = `<strong>Before (${resData.target})</strong><br>${resData.before}`;
              const afterDiv = document.createElement('div');
              afterDiv.className = 'file-pane';
              afterDiv.innerHTML = `<strong>After (${resData.target})</strong><br>${resData.after}`;
              compareDiv.appendChild(beforeDiv);
              compareDiv.appendChild(afterDiv);
              resultDiv.appendChild(compareDiv);
            } else if (resData.type === 'diff_proposal') {
              const diffDiv = document.createElement('div');
              diffDiv.className = 'diff-view';
              diffDiv.innerHTML = `<strong>Diff (${resData.target})</strong><br>${resData.diff}`;
              resultDiv.appendChild(diffDiv);
            } else {
              const resultPre = document.createElement('pre');
              resultPre.textContent = chunk.result;
              resultDiv.appendChild(resultPre);
            }
          } else if (chunk.status === 'pending') {
            const pendingMsg = document.createElement('div');
            pendingMsg.textContent = ' (Pending...)';
            pendingMsg.style.fontStyle = 'italic';
            resultDiv.appendChild(pendingMsg);
          } else {
            const noResultMsg = document.createElement('div');
            noResultMsg.textContent = ' (No result yet)';
            resultDiv.appendChild(noResultMsg);
          }
          contentDiv.appendChild(resultDiv);
          container.appendChild(contentDiv);
          if (chunk.is_blocking) {
            blockingMessageId = chunk.id;
            const btnApprove = document.createElement('button');
            btnApprove.textContent = 'Approve';
            btnApprove.addEventListener('click', () => {
              handleDecision(container.dataset.messageId, 'approve');
            });
            const btnReject = document.createElement('button');
            btnReject.textContent = 'Reject';
            btnReject.addEventListener('click', () => {
              handleDecision(container.dataset.messageId, 'reject');
            });
            container.appendChild(btnApprove);
            container.appendChild(btnReject);
          }
          this.responseContainer.appendChild(container);
        }
      };

      finalizeState() {
        if (this.streamState.type === 'message') {
          smd.parser_end(this.streamState.parser);
          this.streamState.parser = null;
        }
      };
    }

      async function loadConversation(conv_id) {
        const res = await fetch(`/api/conversations/${conv_id}`);
        const data = await res.json();
        blockingMessageId = data.blocking_message_id;
        const responseContainer = document.getElementById('response');
        responseContainer.innerHTML = '';
        const title = document.createElement('h2');
        const displayTitle = data.title || ("Conversation (" + data.id + ")");
        title.textContent = displayTitle + ' (' + new Date(data.created_at).toLocaleString() + ')';
        responseContainer.appendChild(title);
        const renderer = new ChatStreamRenderer(responseContainer);
        for (const msg of data.messages) {
          renderer.initializeState(msg.element.type, msg.role);
          renderer.handleStreamChunk(msg.element)
          renderer.finalizeState();
        }
        responseContainer.scrollTop = responseContainer.scrollHeight;
      }

    async function* streamPrompt(res, responseContainer) {
      if (res.status === 403) {
        const data = await res.json();
        highlightBlockingMessage(data.blocking_message_id);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      if (!selectedConversationId) {
        const newConvId = res.headers.get('X-Conversation-ID');
        if (newConvId) {
          selectedConversationId = newConvId;
        }
        const title = document.createElement('h2');
        title.textContent = 'New Conversation (' + new Date().toLocaleString() + ')';
        responseContainer.prepend(title);
      }

      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed) {
            const jsonObj = JSON.parse(trimmed);
            yield jsonObj;
          }
        }
      }
      if (buffer.trim()) {
        const jsonObj = JSON.parse(buffer.trim());
        yield jsonObj;
      }
    }

    async function processStream(res, responseContainer) {
      const renderer = new ChatStreamRenderer(responseContainer);
      for await (const val of streamPrompt(res, responseContainer)) {
        if (val.type !== renderer.streamState.type) {
          renderer.finalizeState();
          renderer.initializeState(val.type, 'assistant');
        }
        renderer.handleStreamChunk(val);
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    async function resumeConversation(conversationId) {
      const modelId = document.getElementById('modelSelect').value;
      const res = await fetch(`/api/conversations/${conversationId}/continue?model_id=${encodeURIComponent(modelId)}`);
      const responseContainer = document.getElementById('response');
      await processStream(res, responseContainer);
    }

    function renderSingleMessage(container, msg) {
      const renderer = new ChatStreamRenderer(container);
      renderer.initializeState(msg.element.type, msg.role);
      renderer.handleStreamChunk(msg.element);
      renderer.finalizeState();
    }

    async function sendPrompt() {
      const responseContainer = document.getElementById('response');
      const promptText = document.getElementById('prompt').value;
      
      renderSingleMessage(responseContainer, { id: null, role: 'user', element: { type: 'message', content: promptText } });
      document.getElementById('prompt').value = '';

      const res = await fetch('/api/conversations/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: promptText,
          conversation_id: selectedConversationId
        })
      });
      if (res.status === 403) {
        const data = await res.json();
        highlightBlockingMessage(data.blocking_message_id);
        const promptArea = document.getElementById('prompt');
        const sendBtn = document.getElementById('sendBtn');
        if (promptArea) promptArea.disabled = true;
        if (sendBtn) sendBtn.disabled = true;
        return;
      }
      await processStream(res, responseContainer);
    }

    async function handleDecision(msgId, decision) {
      const res = await fetch(`/api/conversations/${selectedConversationId}/tool_calls/${msgId}/decide`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision })
      });
      if (res.ok) {
        const container = document.querySelector(`details[data-message-id='${msgId}']`);
        if (container) {
          const btns = container.querySelectorAll('button');
          btns.forEach(b => b.remove());
        }
        clearBlock();
        await resumeConversation(selectedConversationId);
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    document.getElementById('newBtnSide').addEventListener('click', () => {
      document.getElementById('prompt').value = '';
      document.getElementById('response').innerHTML = '';
      selectedConversationId = null;
      loadConversations();
    });

    loadModels();
    loadConversations();
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const files = document.getElementById('fileInput').files;
      if (!files.length) return;
      const formData = new FormData();
      for (const f of files) formData.append('files', f);
      const res = await fetch('/api/ingest', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      alert(`Uploaded ${data.ids.length} documents.`);
    });

    document.getElementById('searchBtn').addEventListener('click', async () => {
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 10 })
      });
      const data = await res.json();
      const container = document.getElementById('response');
      container.innerHTML = '<h3>Search Results</h3>';
      data.results.forEach(r => {
        const div = document.createElement('div');
        div.innerHTML = `<strong>${r.title}</strong> (score ${r.score.toFixed(4)}): ${r.snippet}`;
        container.appendChild(div);
      });
    });

    document.getElementById('estimateBtn').addEventListener('click', async () => {
      const modelId = document.getElementById('modelEstimateInput').value;
      const deviceMetric = document.getElementById('deviceMetricInput').value;
      if (!modelId) return;
      
      let url = `/api/estimate?model_id=${encodeURIComponent(modelId)}`;
      if (deviceMetric) url += `&device_metric=${encodeURIComponent(deviceMetric)}`;
      
      const res = await fetch(url);
      const data = await res.json();
      const resultDiv = document.getElementById('estimateResult');
      
      if (data.error) {
        resultDiv.textContent = `Error: ${data.error}`;
      } else {
        const vramGB = (data.vram / (1024**3)).toFixed(2);
        const ramGB = (data.ram / (1024**3)).toFixed(2);
        const tps = data.tps ? data.tps.toFixed(2) : "N/A";
        resultDiv.textContent = `VRAM: ${vramGB} GB\nRAM: ${ramGB} GB\nTPS: ${tps}`;
      }
    });
  </script>
</body>

</html>
