<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>myAI Mock UI</title>
  <style>
    html, body { margin: 0; font-family: Arial, sans-serif; }
    #controls { padding: 10px; background: #f0f0f0; }
    #controls > div { margin-bottom: 8px; }
    #prompt { width: 100%; }
    pre#response { padding:10px; background:#eee; white-space: pre-wrap; word-wrap: break-word; max-height:50vh; overflow-y:auto; }
  </style>
</head>
<body>
  <h1>myAI – Mock Interface</h1>

  <pre id="response"></pre>

  <div id="controls">
    <div>
      <label for="modelSelect">Select Model:</label>
      <select id="modelSelect"></select>
    </div>
    <div>
      <textarea id="prompt" rows="4" placeholder="Enter prompt here"></textarea>
    </div>
    <button id="sendBtn">Send Prompt</button>
  </div>

  <script>
    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const select = document.getElementById('modelSelect');
        data.models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          select.appendChild(opt);
        });
        // Restore and persist selected model after options added
        const savedModel = localStorage.getItem('selectedModel');
        if (savedModel) {
          document.getElementById('modelSelect').value = savedModel;
        }
        document.getElementById('modelSelect').addEventListener('change', () => {
          localStorage.setItem('selectedModel', document.getElementById('modelSelect').value);
        });


      }







    async function sendPrompt() {
      const res = await fetch('/api/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: document.getElementById('prompt').value
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      const responseContainer = document.getElementById('response');
      let buffer = '';
      let currentWriteElem = null;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        while (true) {
          const startIdx = buffer.indexOf('{');
          if (startIdx === -1) break;
          let depth = 0;
          let endIdx = -1;
          for (let i = startIdx; i < buffer.length; i++) {
            if (buffer[i] === '{') depth++;
            else if (buffer[i] === '}') depth--;
            if (depth === 0) {
              endIdx = i;
              break;
            }
          }
          if (endIdx === -1) break;
          const jsonStr = buffer.slice(startIdx, endIdx + 1);
          buffer = buffer.slice(endIdx + 1);
          try {
            const val = JSON.parse(jsonStr);
            const msg = val['message'];
            const mode = 'thinking' in msg ? 'thinking' : 'response';
            if (!currentWriteElem || mode !== currentWriteElem.dataset.mode) {
              const container = mode === 'thinking' ? document.createElement('details') : document.createElement('p');
              if (mode === 'thinking') {
                const summary = document.createElement('summary');
                summary.textContent = 'Thinking';
                container.appendChild(summary);
              }
              container.dataset.mode = mode;
              responseContainer.appendChild(container);
              currentWriteElem = container;
            }
            const token = mode === 'thinking' ? msg['thinking'] : msg['content'];
            if (token) currentWriteElem.append(token);
          } catch (e) {
            console.error('JSON parse error', e);
          }
        }
      }
      // scroll to bottom
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    loadModels();
  </script>
</body>
</html>
