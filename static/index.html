<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>myAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      display: grid;
      grid-template-columns: 200px 1fr;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #222;
    }

    /* Sidebar */
    #sidebar {
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      padding: 10px;
      height: 100vh;
      overflow: hidden;
    }
    #sidebarHeader { text-align: center; flex-shrink: 0; padding: 10px 0; }
    #sidebarHeader h2 { margin: 0; font-size: 18px; }
    #sidebarNav { flex: 1; overflow-y: auto; min-height: 0; }
    #sidebarFooter { flex-shrink: 0; }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 8px;
      margin-bottom: 4px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .menu-item:hover { background: #f8f8f8; border-color: #bbb; }
    .menu-item.selected { border-color: #444; }
    .conv-delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      padding: 0 4px;
      line-height: 1;
      margin-left: 8px;
    }
    .conv-delete-btn:hover { color: #f00; background: #fee; border-radius: 3px; }

    #main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* Chat window */
    #chatHistory { flex: 1; padding: 10px; overflow: auto; background: #fff; }
    #inputArea { padding: 10px; background: #fff; border-top: 1px solid #eee; }
    #prompt { width: 100% }
    /* Chat - messages */
    .msg-label { font-weight: bold; margin-top: 1em; }
    .msg-body { margin-top: .5em; overflow-wrap: break-word; word-break: break-word; }
    .msg-body table { border-collapse: collapse; width: 100%; margin-top: 0.5em; }
    .msg-body th, .msg-body td { border: 1px solid #ddd; padding: 4px; }
    .msg-body th { background: #f9f9f9; }
    .blocked { background-color: #ffe6e6; border-left: 4px solid #f00; }
    .msg-header { display: flex; justify-content: space-between; align-items: center; }
    /* Chat - tool calls */
    .diff-view {
      background: #f8f8f8;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      margin-top: 10px;
      overflow-x: auto;
    }
    .reject-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      padding: 10px;
      background: #fdf2f2;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
    }
    .reject-input-row { display: flex; gap: 8px; }
    /* Chat - scope selection */
    #scopeSelectorContainer { margin-bottom: 10px; }
    #scopePills { display: inline-flex; gap: 5px; }
    .scope-pill {
      background: #f5f5f5;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 0.95em;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .scope-pill .remove-btn { cursor: pointer; font-weight: bold; color: #888; }
    .scope-pill .remove-btn:hover { color: #f00; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 16px;
    }
    .card h3 { margin: 0 0 12px 0; font-size: 15px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.2;
      background: #fff;
      color: #333;
    }
    .btn:hover:not(:disabled) { background: #f0f0f0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #555; color: #fff; border-color: #555; }
    .btn-primary:hover:not(:disabled) { background: #444; border-color: #444; }
    .btn-approve { background: #2a8a4a; color: #fff; border-color: #2a8a4a; }
    .btn-approve:hover:not(:disabled) { background: #1e6e38; border-color: #1e6e38; }
    .btn-reject { background: #888; color: #fff; border-color: #888; }
    .btn-reject:hover:not(:disabled) { background: #666; border-color: #666; }
    .btn-block { width: 100%; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    input, select, textarea {
      font-size: 13px;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    input:disabled, select:disabled, textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    } 
    input:focus, select:focus, textarea:focus { outline: none; border-color: #007bff; }

    .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .field { flex: 1; }
    .field label { display: block; font-size: 0.85em; color: #666; margin-bottom: 4px; }
    .field input, .field select { width: 100%; }

    /* Inference - system */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .stat {
      background: #f9f9f9;
      padding: 8px 10px;
      border-radius: 4px;
    }
    .stat .label { font-size: 0.8em; color: #666; display: block; }
    .stat .value { font-size: 1.1em; font-weight: 600; color: #222; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #e0e0e0; background: #fafafa; flex-shrink: 0; }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: #333; background: #f0f0f0; }
    .tab.active { color: #007bff; border-bottom-color: #007bff; }
    .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    .tab-pane.active { display: block; }

    .pane-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* Models */
    .model-list {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      padding: 8px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .model-item { padding: 4px 8px; border-bottom: 1px solid #eee; }
    .model-item:last-child { border-bottom: none; }

    .result-box {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      white-space: pre-wrap;
      display: none;
    }
    .result-box.error { border-color: #f5c6cb; background: #fdf2f2; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin .8s linear infinite;
      margin-right: 8px;
    }

    /* Repositories view */
    .repo-panels { display: grid; grid-template-columns: 240px 1fr; height: 100%; overflow: hidden; }
    .repo-sidebar { padding: 12px; overflow-y: auto; border-right: 1px solid #e0e0e0; background: #fafafa; }
    .repo-sidebar h3 { margin: 0 0 10px 0; font-size: 15px; }
    .repo-sidebar h3.small { font-size: 13px; margin-bottom: 8px; }
    .repo-detail { padding: 12px; overflow-y: auto; }
    .repo-detail h3 { margin: 0 0 12px 0; font-size: 16px; }
    .repo-detail h4 { margin: 0 0 6px 0; font-size: 13px; color: #555; }
    .repo-search-row { margin-bottom: 12px; }
    .repo-search-row input { width: 100%; }
    .repo-search-row .btn { margin-top: 6px; }
    .repo-filelist { border: 1px solid #e0e0e0; border-radius: 4px; padding: 8px; max-height: 400px; overflow-y: auto; font-size: 13px; }
    .repo-file-item { padding: 3px 0; border-bottom: 1px solid #f0f0f0; font-family: monospace; font-size: 12px; }
    .repo-file-item:last-child { border-bottom: none; }
    .repo-result-item { padding: 6px; margin-bottom: 4px; background: #f9f9f9; border-radius: 4px; font-size: 12px; }
    .repo-placeholder { color: #888; text-align: center; margin-top: 40px; }
    .repo-search-results { margin-bottom: 12px; }
  </style>
</head>

<body>
  <div id="sidebar">
    <div id="sidebarHeader"><h2>myAI</h2></div>
    <div id="sidebarNav">
      <button id="newBtnSide" class="menu-item">+ New</button>
      <div id="conversationList"></div>
    </div>
    <div id="sidebarFooter">
      <button id="inferenceBtnSide" class="menu-item">Inference</button>
      <button id="reposBtnSide" class="menu-item">Repositories</button>
    </div>
  </div>

  <div id="main">
    <!-- Chat -->
    <div id="chatView" class="view active">
      <div id="chatHistory"><div id="response"></div></div>
      <div id="inputArea">
        <div id="scopeSelectorContainer">
          <label>Scopes:</label>
          <select id="scopeSelect"></select>
          <div id="scopePills"></div>
        </div>
        <textarea id="prompt" rows="7" placeholder="Enter prompt here"></textarea>
        <label for="modelSelect">Select Model:</label>
        <select id="modelSelect"></select>
        <button id="sendBtn" class="btn btn-primary" style="margin-top:8px">Send</button>
        <button id="continueBtn" class="btn" style="margin-top:8px">Continue</button>
      </div>
    </div>

    <!-- Inference -->
    <div id="inferenceView" class="view">
      <div class="tabs">
        <button class="tab active" data-tab="system">System</button>
        <button class="tab" data-tab="models">Models</button>
      </div>

      <div id="systemTab" class="tab-pane active">
        <div class="pane-grid">
          <div class="card">
            <h3>GPU Status</h3>
            <div id="gpuStatusGrid" class="stat-grid"></div>
          </div>
          <div class="card">
            <h3>GPU Performance Benchmark</h3>
            <div class="field-row">
              <div class="field">
                <label>TFLOPS Matrix Size</label>
                <input type="number" id="tflopsSizeInput" value="4096">
              </div>
              <div class="field">
                <label>Bandwidth Size</label>
                <input type="number" id="bwSizeInput" value="8192">
              </div>
            </div>
            <button id="runBenchmarkBtn" class="btn btn-primary btn-block">Run Benchmark</button>
            <div id="benchmarkResult" class="stat-grid" style="display:none"></div>
          </div>
        </div>
      </div>

      <div id="modelsTab" class="tab-pane">
        <div class="pane-grid">
          <div>
            <h2 style="margin-top:0">Cached HuggingFace Models</h2>
            <div id="cachedModelsList" class="model-list"></div>
            <p><a href="https://huggingface.co/models?search=gguf" target="_blank">Search for GGUF models on HuggingFace</a></p>
          </div>
          <div>
            <h2 style="margin-top:0">Estimation Tool</h2>
            <div class="field">
              <label>Select Model (or HF alias)</label>
              <div class="field-row">
                <select id="modelsEstimateSelect" style="flex:1"></select>
                <input type="text" id="modelsEstimateInput" style="flex:1" placeholder="OR paste HF Model Alias...">
              </div>
            </div>
            <div class="field" style="margin-top:10px">
              <label>Hardware Profile (TFLOPS;Bandwidth)</label>
              <input type="text" id="modelsDeviceMetricInput" placeholder="e.g. 35TFLOPS;900GBps">
            </div>
            <button id="estimateBtnModels" class="btn btn-primary btn-block" style="margin-top:10px">Estimate</button>
            <div id="estimateResultModels" class="result-box"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Repositories -->
    <div id="repositoriesView" class="view">
      <div class="repo-panels">
        <div class="repo-sidebar">
          <h3>Repositories</h3>
          <button id="updateIndexBtn" class="btn btn-primary btn-block" style="margin-bottom:10px">Update index</button>
          <div id="repoList"></div>
        </div>
        <div class="repo-detail" id="repoDetail">
          <div class="repo-placeholder" id="repoDetailPlaceholder">
            Select a repository to browse files
          </div>
          <div id="repoDetailContent" style="display:none">
            <h3 id="repoDetailName"></h3>
            <div class="repo-search-row">
              <input type="text" id="repoSearchInput" placeholder="Semantic search in this repo...">
              <button id="repoSearchBtn" class="btn btn-primary">Search</button>
            </div>
            <div class="repo-search-results" id="repoSearchResults"></div>
            <h4>Files</h4>
            <div class="repo-filelist" id="repoFileList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as smdModule from "./vendor/smd.js";
    window.smd = smdModule;
  </script>

  <script>
    let blockingMessageId = null;
    let activeScopes = [];
    let allRepositories = [];
    let selectedConversationId = null;
    let currentView = 'chat';
    let gpuStatusInterval = null;

    function switchView(name) {
      currentView = name;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      if (name === 'chat') {
        document.getElementById('chatView').classList.add('active');
        clearGpuInterval();
      } else if (name === 'inference') {
        document.getElementById('inferenceView').classList.add('active');
        const activeTab = document.querySelector('.tab.active');
        if (activeTab) switchInferenceTab(activeTab.dataset.tab);
        startGpuInterval();
      } else if (name === 'repositories') {
        document.getElementById('repositoriesView').classList.add('active');
        clearGpuInterval();
      }
    }

    function startGpuInterval() {
      if (!gpuStatusInterval) { updateGpuStatus(); gpuStatusInterval = setInterval(updateGpuStatus, 5000); }
    }
    function clearGpuInterval() {
      if (gpuStatusInterval) { clearInterval(gpuStatusInterval); gpuStatusInterval = null; }
    }

    function switchInferenceTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
      document.getElementById(name + 'Tab').classList.add('active');
      if (name === 'system') { updateGpuStatus(); startGpuInterval(); } else clearGpuInterval();
    }

    async function updateGpuStatus() {
      const grid = document.getElementById('gpuStatusGrid');
      try {
        const res = await fetch('/api/gpu-stats');
        const d = await res.json();
        const freeGB = (d.free / (1024**3)).toFixed(2);
        const totalGB = (d.total / (1024**3)).toFixed(2);
        const usedGB = (parseFloat(totalGB) - parseFloat(freeGB)).toFixed(2);
        const pct = totalGB > 0 ? ((usedGB / totalGB) * 100).toFixed(1) : 0;
        grid.innerHTML = `
          <div class="stat"><span class="label">Free</span><span class="value">${freeGB} GB</span></div>
          <div class="stat"><span class="label">Total</span><span class="value">${totalGB} GB</span></div>
          <div class="stat"><span class="label">Used</span><span class="value">${usedGB} GB</span></div>
          <div class="stat"><span class="label">Usage</span><span class="value">${pct}%</span></div>`;
      } catch { grid.innerHTML = '<div class="stat"><span class="label">Error</span><span class="value">—</span></div>'; }
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const chatSelect = document.getElementById('modelSelect');
      chatSelect.innerHTML = '';
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.name; chatSelect.appendChild(opt);
      });
      const saved = localStorage.getItem('selectedModel');
      if (saved) chatSelect.value = saved;
      chatSelect.addEventListener('change', () => localStorage.setItem('selectedModel', chatSelect.value));

      const estSelect = document.getElementById('modelsEstimateSelect');
      estSelect.innerHTML = '<option value="" disabled selected>Select from cache...</option>';
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.name; estSelect.appendChild(opt);
      });
      const savedMetrics = localStorage.getItem('deviceMetrics');
      if (savedMetrics) document.getElementById('modelsDeviceMetricInput').value = savedMetrics;
    }

    async function loadCachedModels() {
      try {
        const res = await fetch('/api/cached-models');
        const data = await res.json();
        const div = document.getElementById('cachedModelsList');
        div.innerHTML = '';
        data.models.forEach(m => {
          const el = document.createElement('div');
          el.className = 'model-item'; el.textContent = m; div.appendChild(el);
        });
      } catch (e) { console.error("Failed to load cached models", e); }
    }

    async function loadRepositories() {
      try {
        const res = await fetch('/api/repositories');
        const data = await res.json();
        allRepositories = data.repositories || [];
        const select = document.getElementById('scopeSelect');
        select.innerHTML = '<option value="" disabled selected>Select a scope...</option>';
        allRepositories.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r; opt.textContent = r; select.appendChild(opt);
        });
        select.addEventListener('change', e => {
          const repo = e.target.value;
          if (repo && !activeScopes.includes(repo)) { activeScopes.push(repo); renderScopePills(); }
          select.value = '';
        });
        renderRepoList();
      } catch (e) { console.error("Failed to load repositories", e); }
    }

    function renderRepoList() {
      const container = document.getElementById('repoList');
      container.innerHTML = '';
      allRepositories.forEach(r => {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.textContent = r;
        item.addEventListener('click', () => selectRepo(r));
        container.appendChild(item);
      });
    }

    async function selectRepo(name) {
      document.getElementById('repoDetailPlaceholder').style.display = 'none';
      document.getElementById('repoDetailContent').style.display = 'block';
      document.getElementById('repoDetailName').textContent = name;
      document.getElementById('repoSearchResults').innerHTML = '';
      document.getElementById('repoSearchInput').value = '';

      const fileList = document.getElementById('repoFileList');
      fileList.innerHTML = '<div class="repo-placeholder">Loading files...</div>';
      try {
        const res = await fetch(`/api/repositories/${encodeURIComponent(name)}/files`);
        const data = await res.json();
        fileList.innerHTML = '';
        if (!data.files || data.files.length === 0) {
          fileList.innerHTML = '<div style="color:#888">No files found</div>';
          return;
        }
        data.files.forEach(f => {
          const el = document.createElement('div');
          el.className = 'repo-file-item';
          el.textContent = f;
          fileList.appendChild(el);
        });
      } catch {
        fileList.innerHTML = '<div style="color:#c00">Error loading files</div>';
      }
    }

    async function searchInRepo() {
      const repoName = document.getElementById('repoDetailName').textContent;
      const query = document.getElementById('repoSearchInput').value;
      if (!query.trim()) return;
      const resultsContainer = document.getElementById('repoSearchResults');
      resultsContainer.innerHTML = '<div class="repo-placeholder">Searching...</div>';
      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: 10, scopes: [repoName] })
        });
        const data = await res.json();
        resultsContainer.innerHTML = '<h4 style="margin:0 0 6px 0">Search Results</h4>';
        if (!data.results || data.results.length === 0) {
          resultsContainer.innerHTML += '<div style="color:#888">No results</div>';
          return;
        }
        data.results.forEach(r => {
          const div = document.createElement('div');
          div.className = 'repo-result-item';
          div.innerHTML = `<strong>${r.title}</strong> (score ${r.score.toFixed(4)})<br>${r.snippet}`;
          resultsContainer.appendChild(div);
        });
      } catch {
        resultsContainer.innerHTML = '<div style="color:#c00">Search error</div>';
      }
    }

    function renderScopePills() {
      const c = document.getElementById('scopePills');
      c.innerHTML = '';
      activeScopes.forEach(s => {
        const pill = document.createElement('div');
        pill.className = 'scope-pill';
        pill.innerHTML = `<span>${s}</span><span class="remove-btn" data-scope="${s}">&times;</span>`;
        pill.querySelector('.remove-btn').addEventListener('click', e => {
          activeScopes = activeScopes.filter(x => x !== e.target.dataset.scope);
          renderScopePills();
        });
        c.appendChild(pill);
      });
    }

    function highlightBlockingMessage(id) {
      blockingMessageId = id;
      const el = document.querySelector(`details[data-message-id='${id}']`);
      if (el) { el.classList.add('blocked'); el.scrollIntoView({ behavior: 'smooth' }); }
    }

    function blockConversation(id) {
      blockingMessageId = id;
      document.getElementById('prompt').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    }

    function clearBlock() {
      blockingMessageId = null;
      document.getElementById('prompt').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.querySelectorAll('details[data-message-id]').forEach(e => e.classList.remove('blocked'));
    }

    async function deleteConversation(id, ev) {
      ev.stopPropagation();
      if (!confirm('Delete this conversation?')) return;
      try {
        const res = await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
        if (res.ok) {
          if (selectedConversationId === id) { selectedConversationId = null; document.getElementById('response').innerHTML = ''; }
          loadConversations();
        } else { alert('Error deleting conversation'); }
      } catch { alert('Failed to delete conversation'); }
    }

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      const list = document.getElementById('conversationList');
      list.innerHTML = '';
      data.forEach(conv => {
        const div = document.createElement('div');
        const span = document.createElement('span');
        span.textContent = conv.title || ("Conversation #" + conv.id);
        const del = document.createElement('button');
        del.className = 'conv-delete-btn'; del.innerHTML = '&times;'; del.title = 'Delete';
        del.addEventListener('click', e => deleteConversation(conv.id, e));
        div.appendChild(span); div.appendChild(del);
        div.className = 'menu-item'; div.dataset.id = conv.id;
        if (selectedConversationId === conv.id) div.classList.add('selected');
        div.addEventListener('click', () => {
          switchView('chat');
          document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          selectedConversationId = conv.id;
          loadConversation(conv.id);
        });
        list.appendChild(div);
      });
    }

    class ChatStreamRenderer {
      constructor(container) {
        this.container = container;
        this.state = { type: null };
      }

      init(type, role) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';
        this.container.appendChild(wrapper);
        this.wrapper = wrapper;

        const header = document.createElement('div');
        header.className = 'msg-header';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = role + ':';
        header.appendChild(label);
        this.state = { type };

        const makeCopy = (holder) => {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.textContent = 'Copy';
          btn.onclick = () => {
            navigator.clipboard.writeText(holder.content).then(() => {
              btn.textContent = 'Copied!';
              setTimeout(() => btn.textContent = 'Copy', 2000);
            });
          };
          header.appendChild(btn);
        };
        wrapper.appendChild(header);

        if (type === 'thinking') {
          const det = document.createElement('details');
          det.innerHTML = '<summary>Reasoning</summary>';
          det.dataset.mode = 'thinking';
          wrapper.appendChild(det);
          const r = smd.default_renderer(det);
          this.state.parser = smd.parser(r);
          this.state.full = { content: '' };
          makeCopy(this.state.full);
        } else if (type === 'message') {
          const div = document.createElement('div');
          div.className = 'msg-body';
          wrapper.appendChild(div);
          const r = smd.default_renderer(div);
          this.state.parser = smd.parser(r);
          this.state.full = { content: '' };
          makeCopy(this.state.full);
        } else if (type === 'tool_call') {
          this.state.blocking = false;
        } else {
          const div = document.createElement('div');
          div.textContent = 'Unknown: ' + type;
          wrapper.appendChild(div);
        }
      }

      write(chunk) {
        if (this.state.type === 'thinking' || this.state.type === 'message') {
          smd.parser_write(this.state.parser, chunk.content);
          this.state.full.content += chunk.content;
        } else if (this.state.type === 'tool_call') {
          const det = document.createElement('details');
          det.dataset.mode = 'function_call';
          det.innerHTML = `<summary>Function Call: ${chunk.name}</summary>`;
          const body = document.createElement('div');
          body.className = 'msg-body';
          const pre = document.createElement('pre');
          const txt = typeof chunk.parameters === 'object' ? JSON.stringify(chunk.parameters, null, 2) : chunk.parameters;
          pre.textContent = 'Input:\n' + txt;
          body.appendChild(pre);
          const out = document.createElement('div');
          out.style.marginTop = '1em';
          out.innerHTML = '<strong>Output:</strong>';
          if (chunk.result) {
            const rd = JSON.parse(chunk.result);
            if (rd.type === 'replace_proposal' || rd.type === 'diff_proposal') {
              const d = document.createElement('div');
              d.className = 'diff-view';
              d.innerHTML = `<strong>Diff (${rd.target})</strong><br>`;
              d.append(rd.diff);
              out.appendChild(d);
            } else {
              const p = document.createElement('pre');
              p.textContent = chunk.result;
              out.appendChild(p);
            }
          } else if (chunk.status === 'pending') {
            const p = document.createElement('div');
            p.textContent = ' (Pending...)'; p.style.fontStyle = 'italic';
            out.appendChild(p);
          } else {
            const p = document.createElement('div');
            p.textContent = ' (No result yet)';
            out.appendChild(p);
          }
          body.appendChild(out);
          det.appendChild(body);
          if (chunk.is_blocking) this.state.blocking = true;
          this.wrapper.appendChild(det);
        }
      }

      finalize(id) {
        this.wrapper.dataset.messageId = id;
        if (this.state.type === 'tool_call' && this.state.blocking) {
          const c = this.wrapper.querySelector('details[data-mode="function_call"]');
          const p = document.createElement('div');
          p.className = 'action-panel';
          const a = document.createElement('button');
          a.className = 'btn btn-approve'; a.textContent = 'Approve';
          a.addEventListener('click', () => handleDecision(id, 'approve'));
          const r = document.createElement('button');
          r.className = 'btn btn-reject'; r.textContent = 'Reject';
          r.addEventListener('click', () => handleDecision(id, 'reject'));
          p.appendChild(a); p.appendChild(r);
          c.appendChild(p);
          blockingMessageId = id;
        } else blockingMessageId = null;
        if (this.state.type === 'message') smd.parser_end(this.state.parser);
        this.state = { type: null };
      }
    }

    async function loadConversation(id) {
      const res = await fetch(`/api/conversations/${id}`);
      const data = await res.json();
      blockingMessageId = data.blocking_message_id;
      document.getElementById('continueBtn').disabled = blockingMessageId !== null;
      const rc = document.getElementById('response');
      rc.innerHTML = '';
      const t = document.createElement('h2');
      t.textContent = (data.title || ("Conversation (" + data.id + ")")) + ' (' + new Date(data.created_at).toLocaleString() + ')';
      rc.appendChild(t);
      const r = new ChatStreamRenderer(rc);
      for (const msg of data.messages) {
        r.init(msg.element.type, msg.role);
        r.write(msg.element);
        r.finalize(msg.id);
      }
      document.getElementById('chatHistory').scrollTop = document.getElementById('chatHistory').scrollHeight;
    }

    async function* streamPrompt(res) {
      if (res.status === 403) {
        const d = await res.json();
        blockConversation(d.blocking_message_id);
        highlightBlockingMessage(d.blocking_message_id);
        return;
      }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          const t = line.trim();
          if (t) { try { yield JSON.parse(t); } catch (e) { console.error("JSON parse error", e); } }
        }
      }
      if (buf.trim()) { try { yield JSON.parse(buf.trim()); } catch (e) { console.error("JSON parse error", e); } }
    }

    async function processStream(res, container, onConvStart) {
      document.getElementById('continueBtn').disabled = true;
      const r = new ChatStreamRenderer(container);
      const raw = res.headers.get('X-Conversation-ID');
      const cid = parseInt(raw);
      if (onConvStart) onConvStart(cid);
      for await (const v of streamPrompt(res)) {
        if (v.type === 'finalized') r.finalize(v.id);
        else if (v.type !== r.state.type) r.init(v.type, 'assistant');
        r.write(v);
      }
      document.getElementById('continueBtn').disabled = false;
    }

    async function resumeConversation(id) {
      const mid = document.getElementById('modelSelect').value;
      const res = await fetch(`/api/conversations/${id}/continue?model_id=${encodeURIComponent(mid)}`);
      await processStream(res, document.getElementById('response'));
    }

    document.getElementById('continueBtn').addEventListener('click', () => {
      if (selectedConversationId) resumeConversation(selectedConversationId);
    });

    function renderSingleMessage(container, msg) {
      const r = new ChatStreamRenderer(container);
      r.init(msg.element.type, msg.role);
      r.write(msg.element);
      r.finalize(msg.id);
    }

    async function sendPrompt() {
      const rc = document.getElementById('response');
      const text = document.getElementById('prompt').value;
      if (!text.trim()) return;
      const isNew = !selectedConversationId;
      renderSingleMessage(rc, { id: null, role: 'user', element: { type: 'message', content: text } });
      document.getElementById('prompt').value = '';
      const res = await fetch('/api/conversations/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: text,
          conversation_id: selectedConversationId,
          scopes: activeScopes
        })
      });
      if (res.status === 403) {
        const d = await res.json();
        blockConversation(d.blocking_message_id);
        highlightBlockingMessage(d.blocking_message_id);
        return;
      }
      await processStream(res, rc, (cid) => {
        if (cid !== selectedConversationId) {
          selectedConversationId = cid;
          loadConversations();
          if (isNew) {
            const t = document.createElement('h2');
            t.textContent = 'New Conversation (' + new Date().toLocaleString() + ')';
            rc.prepend(t);
          }
        }
      });
    }

    async function executeDecision(msgId, decision, comment) {
      const res = await fetch(`/api/conversations/${selectedConversationId}/tool_calls/${msgId}/decide`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision, comment: comment || '' })
      });
      if (res.ok) {
        const w = document.querySelector(`.message-wrapper[data-message-id='${msgId}']`);
        if (w) { const a = w.querySelector('.action-panel'); if (a) a.remove(); const r = w.querySelector('.reject-panel'); if (r) r.remove(); }
        clearBlock();
        await resumeConversation(selectedConversationId);
      }
    }

    async function handleDecision(id, decision) {
      if (decision === 'approve') await executeDecision(id, 'approve');
      else showRejectInput(id);
    }

    function showRejectInput(id) {
      const c = document.querySelector(`.message-wrapper[data-message-id='${id}']`);
      if (!c) return;
      const ap = c.querySelector('.action-panel');
      if (ap) ap.style.display = 'none';
      const panel = document.createElement('div');
      panel.className = 'reject-panel';
      const row = document.createElement('div');
      row.className = 'reject-input-row';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.placeholder = 'Reason for rejection...'; inp.className = 'reject-input';
      const conf = document.createElement('button');
      conf.className = 'btn'; conf.textContent = 'Confirm';
      const cancel = document.createElement('button');
      cancel.className = 'btn'; cancel.textContent = 'Cancel';
      row.appendChild(inp); row.appendChild(conf); row.appendChild(cancel);
      panel.appendChild(row);
      conf.onclick = async () => { await executeDecision(id, 'reject', inp.value.trim()); };
      cancel.onclick = () => { panel.remove(); if (ap) ap.style.display = ''; };
      c.appendChild(panel);
      inp.focus();
    }

    document.getElementById('repoSearchBtn').addEventListener('click', searchInRepo);

    document.getElementById('updateIndexBtn').addEventListener('click', () => {
      fetch('/api/sync', { method: 'POST' }).catch(e => console.error('Sync failed', e));
    });

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    document.getElementById('newBtnSide').addEventListener('click', () => {
      switchView('chat');
      document.getElementById('prompt').value = '';
      document.getElementById('response').innerHTML = '';
      selectedConversationId = null;
      loadConversations();
    });

    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchInferenceTab(t.dataset.tab)));
    document.getElementById('inferenceBtnSide').addEventListener('click', () => switchView('inference'));
    document.getElementById('reposBtnSide').addEventListener('click', () => switchView('repositories'));

    loadModels();
    loadCachedModels();
    loadConversations();
    loadRepositories();
    document.getElementById('estimateBtnModels').addEventListener('click', async () => {
      const select = document.getElementById('modelsEstimateSelect');
      const input = document.getElementById('modelsEstimateInput');
      const dm = document.getElementById('modelsDeviceMetricInput').value;
      const mid = input.value || select.value;
      if (!mid) return;
      localStorage.setItem('deviceMetrics', dm);
      let url = `/api/estimate?model_id=${encodeURIComponent(mid)}`;
      if (dm) url += '&device_metric=' + encodeURIComponent(dm);
      const res = await fetch(url);
      const data = await res.json();
      const box = document.getElementById('estimateResultModels');
      box.style.display = 'block';
      if (data.error) {
        box.textContent = 'Error: ' + data.error;
        box.className = 'result-box error';
      } else {
        const v = (data.vram / (1024**3)).toFixed(2);
        const r = (data.ram / (1024**3)).toFixed(2);
        const t = data.tps ? data.tps.toFixed(2) : 'N/A';
        box.textContent = 'Weights Size: ' + v + ' GB\nKV Cache Size: ' + r + ' GB\nTotal: ' + (parseFloat(v) + parseFloat(r)).toFixed(2) + ' GB\nTPS Estimate: ' + t;
        box.className = 'result-box';
      }
    });

    document.getElementById('modelsEstimateSelect').addEventListener('change', e => { document.getElementById('modelsEstimateInput').value = ''; });
    document.getElementById('modelsEstimateInput').addEventListener('input', e => { if (e.target.value) document.getElementById('modelsEstimateSelect').value = ''; });

    document.getElementById('runBenchmarkBtn').addEventListener('click', async () => {
      const btn = document.getElementById('runBenchmarkBtn');
      const box = document.getElementById('benchmarkResult');
      const ts = document.getElementById('tflopsSizeInput').value || 4096;
      const bs = document.getElementById('bwSizeInput').value || 8192;
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Running...';
      box.style.display = 'grid'; box.innerHTML = '<div class="stat"><span class="label">Running</span><span class="value">Please wait...</span></div>';
      try {
        const res = await fetch(`/api/gpu-benchmark?tflops_size=${ts}&bw_size=${bs}`);
        const d = await res.json();
        if (d.status === 'success') {
          box.innerHTML = `
            <div class="stat"><span class="label">FP32 TFLOPS</span><span class="value">${d.tflops.fp32.tflops.toFixed(2)}</span></div>
            <div class="stat"><span class="label">FP16 TFLOPS</span><span class="value">${d.tflops.fp16.tflops ? d.tflops.fp16.tflops.toFixed(2) : 'Error'}</span></div>
            <div class="stat"><span class="label">INT8 TFLOPS</span><span class="value">${d.tflops.int8.tflops ? d.tflops.int8.tflops.toFixed(2) : 'Error'}</span></div>
            <div class="stat"><span class="label">Bandwidth</span><span class="value">${d.bandwidth.gb_s.toFixed(2)} GB/s</span></div>`;
        } else box.innerHTML = '<div class="stat"><span class="label">Error</span><span class="value">' + d.message + '</span></div>';
      } catch (e) { box.innerHTML = '<div class="stat"><span class="label">Error</span><span class="value">' + e.message + '</span></div>'; }
      finally { btn.disabled = false; btn.textContent = 'Run Benchmark'; }
    });
  </script>
</body>
