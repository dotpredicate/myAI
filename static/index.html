<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>myAI</title>
  <style>
    body {
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas: "sidebar header" "sidebar main";
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    #sidebar {
      grid-area: sidebar;
      background: #f5f5f5;
      overflow-y: auto;
      padding: 10px;
    }

    #main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #chatHistory {
      flex: 1;
      padding: 10px;
      overflow-y: scroll;
      background: #fff;
      min-height: 0;
    }

    #inputArea {
      padding: 10px;
      background: #fff;
    }

    textarea {
      font-size: 1.25em;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      grid-area: header;
      text-align: center;
    }

    .menu-item {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .menu-item:hover {
      background: #f8f8f8;
      border-color: #bbb;
    }

    .menu-item.selected {
      background: #fff;
      border-color: #444;
    }

    .msg-label {
      font-weight: bold;
      margin-top: 1em;
    }

    .msg-body {
      margin-top: .5em;
    }
    .msg-body table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0.5em;
    }
    .msg-body th,
    .msg-body td {
      border: 1px solid #ddd;
      padding: 4px;
    }
    .msg-body th {
      background: #f9f9f9;
    }
  </style>
</head>

<body>
  <h1 style="text-align:center;">myAI</h1>
  <div id="sidebar">
    <h2>Conversations</h2>
    <button id="newBtnSide" class="menu-item">+ New</button>
    <div id="conversationList"></div>
  </div>
  <div id="main">
    <div id="chatHistory">
      <div id="response"></div>
    </div>
    <div id="inputArea">
      <textarea id="prompt" rows="5" placeholder="Enter prompt here"></textarea>
      <label for="modelSelect">Select Model:</label>
      <select id="modelSelect"></select>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">
    import * as smdModule from "./smd.js";
    // Expose smd to the global scope so other scripts can access it
    window.smd = smdModule;
  </script>

  <script>
    async function loadModels() {
      const res = await fetch('/api/models');
      const data = await res.json();
      const select = document.getElementById('modelSelect');
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        select.appendChild(opt);
      });
      const savedModel = localStorage.getItem('selectedModel');
      if (savedModel) select.value = savedModel;
      select.addEventListener('change', () => {
        localStorage.setItem('selectedModel', select.value);
      });
    }

    let selectedConversationId = null;

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      const list = document.getElementById('conversationList');
      list.innerHTML = '';
      data.forEach(conv => {
        const div = document.createElement('div');
        div.textContent = conv.title;
        div.className = 'menu-item';
        div.dataset.id = conv.id;
        if (selectedConversationId === conv.id) {
          div.classList.add('selected');
        }
        div.addEventListener('click', () => {
          document.querySelectorAll('.menu-item').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          selectedConversationId = conv.id;
          loadConversation(conv.id);
        });
        list.appendChild(div);
      });
    }

    function renderMessage(container, role, label, element) {
      const labelEl = document.createElement('div');
      labelEl.textContent = label + ':';
      labelEl.classList.add('msg-label');
      container.appendChild(labelEl);
      if (element.type === 'thinking') {
        const details = document.createElement('details');
        details.className = 'msg-body';
        const summary = document.createElement('summary');
        summary.textContent = 'Thinking';
        details.appendChild(summary);
        const content = document.createElement('div');
        content.textContent = element.content;
        content.className = 'msg-body';
        details.appendChild(content);
        container.appendChild(details);
      } else if (element.type === 'tool_call') {
        const containerElem = document.createElement('details');
        containerElem.dataset.mode = 'function_call';
        const summary = document.createElement('summary');
        summary.textContent = `Function Call: ${element.name}`;
        containerElem.appendChild(summary);
        const pre = document.createElement('pre');
        pre.textContent = `Input: ${element.parameters}\n\nOutput:\n${element.result}`;
        containerElem.appendChild(pre);
        container.appendChild(containerElem);
      } else {
        // For regular messages, including assistant responses.
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-body';
        // If this is an assistant message, render Markdown using smd.
        if (role === 'assistant') {
          const renderer = smd.default_renderer(msgDiv);
          const parser = smd.parser(renderer);
          // Store parser on element for streaming updates.
          msgDiv._smdParser = parser;
          smd.parser_write(parser, element.content);
          // Since we only have a complete chunk for historical messages, flush.
          smd.parser_end(parser);
        } else {
          // Regular user or tool messages.
          msgDiv.textContent = element.content;
        }
        container.appendChild(msgDiv);
      }
    }

    async function loadConversation(conv_id) {
      const res = await fetch(`/api/conversation/${conv_id}`);
      const data = await res.json();
      const responseContainer = document.getElementById('response');
      responseContainer.innerHTML = '';
      const title = document.createElement('h2');
      title.textContent = data.title + ' (' + new Date(data.created_at).toLocaleString() + ')';
      responseContainer.appendChild(title);
      for (const msg of data.messages) {
        renderMessage(responseContainer, msg.role, msg.role, msg.elements);
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    async function* streamPrompt(promptText, responseContainer) {
      const res = await fetch('/api/prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model_id: document.getElementById('modelSelect').value,
          prompt: promptText,
          conversation_id: selectedConversationId
        })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      if (!selectedConversationId) {
        const newConvId = res.headers.get('X-Conversation-ID');
        if (newConvId) {
          selectedConversationId = newConvId;
        }
        responseContainer.innerHTML = '';
        const title = document.createElement('h2');
        title.textContent = 'New Conversation (' + new Date().toLocaleString() + ')';
        responseContainer.appendChild(title);
      }

      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const startIdx = buffer.indexOf('{');
        if (startIdx === -1) break;
        let depth = 0;
        let endIdx = -1;
        for (let i = startIdx; i < buffer.length; i++) {
          if (buffer[i] === '{') depth++;
          else if (buffer[i] === '}') depth--;
          if (depth === 0) { endIdx = i; break; }
        }
        if (endIdx === -1) break;
        const jsonStr = buffer.slice(startIdx, endIdx + 1);
        buffer = buffer.slice(endIdx + 1);
        yield JSON.parse(jsonStr);
      }
    }
    async function sendPrompt() {

      const responseContainer = document.getElementById('response');
      const promptText = document.getElementById('prompt').value;

      renderMessage(responseContainer, 'user', 'User', { type: 'message', content: promptText });

      var streamState = { type: null };
      
      const initializeState = (newType) => {
        console.log('Initializing state for type', newType);
        const assistantLabel = document.createElement('div');
        assistantLabel.textContent = 'Assistant:';
        assistantLabel.classList.add('msg-label');
        responseContainer.appendChild(assistantLabel);
        if(newType === 'reasoning') {
          const container = document.createElement('details');
          const summary = document.createElement('summary');
          summary.textContent = 'Reasoning';
          container.appendChild(summary);
          container.dataset.mode = 'reasoning';
          responseContainer.appendChild(container);
          streamState.type = 'reasoning';
          streamState.writeElem = container;
        } else if (newType === 'response') {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'msg-body';
          const renderer = smd.default_renderer(msgDiv);
          const parser = smd.parser(renderer);
          responseContainer.appendChild(msgDiv);
          streamState.type = 'response';
          streamState.parser = parser;
        } else if (newType === 'tool_call') {
          streamState.type = 'tool_call';
        } else {
          console.log('Unhandled type', newType);
          // Unhandled state
        }
        console.log('Initialized state', streamState);
      };

      const finalizeState = () => {
        console.log('Finalizing current state', streamState);
        if(streamState.type === 'thinking') {
          // Explicit no-op
        } else if (streamState.type === 'response') {
          smd.parser_end(currentState.parser);
        } else if (streamState.type === 'tool_call') {
          // Explicit no-op
        } else {
          // Unhandled state
        }
      };

      const handleStreamChunk = (chunk) => {
        console.log('Handling stream chunk', chunk)
        if(streamState.type === 'reasoning') {
          const token = chunk.content;
          streamState.writeElem.append(token);
        } else if (streamState.type === 'response') {
          const token = chunk.content;
          smd.parser_write(streamState.parser, token);
        } else if (streamState.type === 'tool_call') {
          const container = document.createElement('details');
          container.dataset.mode = 'function_call';
          const summary = document.createElement('summary');
          summary.textContent = `Function Call: ${chunk.name}`;
          container.appendChild(summary);
          const pre = document.createElement('pre');
          pre.textContent = `Input: ${chunk.parameters}\n\nOutput:\n${chunk.result}`;
          container.appendChild(pre);
          responseContainer.appendChild(container);
        } else {
          // Unhandled state
        }
      };

      for await (const val of streamPrompt(promptText, responseContainer)) {
        if(val.type !== streamState.type) {
          finalizeState();
          initializeState(val.type);
        }
        handleStreamChunk(val);
      }
      responseContainer.scrollTop = responseContainer.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', sendPrompt);
    document.getElementById('newBtnSide').addEventListener('click', () => {
      document.getElementById('prompt').value = '';
      document.getElementById('response').innerHTML = '';
      selectedConversationId = null;
      loadConversations();
    });

    loadModels();
    loadConversations();
  </script>
</body>

</html>
